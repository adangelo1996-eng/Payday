name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # #region agent log
      - name: Debug packageManager declaration
        run: node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const data={sessionId:'15f245',runId:'ci-pre-fix',hypothesisId:'H1',location:'.github/workflows/ci.yml:build-test:debug-package-manager',message:'package.json packageManager value',data:{packageManager:pkg.packageManager||null},timestamp:Date.now()};fetch('http://127.0.0.1:7942/ingest/1c5611e9-a0b8-4fb5-8eee-a548a1a5a71d',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'15f245'},body:JSON.stringify(data)}).catch(()=>{});console.log('DEBUG packageManager:',pkg.packageManager||'missing');"
      # #endregion
      - id: pnpm_setup
        uses: pnpm/action-setup@v4
      # #region agent log
      - name: Debug pnpm setup outcome
        if: always()
        run: node -e "const data={sessionId:'15f245',runId:'ci-pre-fix',hypothesisId:'H2',location:'.github/workflows/ci.yml:build-test:debug-pnpm-setup-outcome',message:'pnpm/action-setup outcome',data:{outcome:'${{ steps.pnpm_setup.outcome }}',conclusion:'${{ steps.pnpm_setup.conclusion }}',configuredVersion:'from-packageManager'},timestamp:Date.now()};fetch('http://127.0.0.1:7942/ingest/1c5611e9-a0b8-4fb5-8eee-a548a1a5a71d',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'15f245'},body:JSON.stringify(data)}).catch(()=>{});console.log('DEBUG pnpm setup outcome:', '${{ steps.pnpm_setup.outcome }}');"
      # #endregion
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      # #region agent log
      - name: Debug install command path
        run: node -e "const data={sessionId:'15f245',runId:'ci-pre-fix',hypothesisId:'H3',location:'.github/workflows/ci.yml:build-test:debug-install-command',message:'install command invocation',data:{command:'pnpm install --frozen-lockfile=false'},timestamp:Date.now()};fetch('http://127.0.0.1:7942/ingest/1c5611e9-a0b8-4fb5-8eee-a548a1a5a71d',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'15f245'},body:JSON.stringify(data)}).catch(()=>{});console.log('DEBUG install command uses pnpm directly');"
      # #endregion
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # #region agent log
      - name: Debug packageManager declaration (security job)
        run: node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const data={sessionId:'15f245',runId:'ci-pre-fix',hypothesisId:'H1',location:'.github/workflows/ci.yml:security-audit:debug-package-manager',message:'package.json packageManager value',data:{packageManager:pkg.packageManager||null},timestamp:Date.now()};fetch('http://127.0.0.1:7942/ingest/1c5611e9-a0b8-4fb5-8eee-a548a1a5a71d',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'15f245'},body:JSON.stringify(data)}).catch(()=>{});console.log('DEBUG packageManager:',pkg.packageManager||'missing');"
      # #endregion
      - id: pnpm_setup
        uses: pnpm/action-setup@v4
      # #region agent log
      - name: Debug pnpm setup outcome (security job)
        if: always()
        run: node -e "const data={sessionId:'15f245',runId:'ci-pre-fix',hypothesisId:'H2',location:'.github/workflows/ci.yml:security-audit:debug-pnpm-setup-outcome',message:'pnpm/action-setup outcome',data:{outcome:'${{ steps.pnpm_setup.outcome }}',conclusion:'${{ steps.pnpm_setup.conclusion }}',configuredVersion:'from-packageManager'},timestamp:Date.now()};fetch('http://127.0.0.1:7942/ingest/1c5611e9-a0b8-4fb5-8eee-a548a1a5a71d',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'15f245'},body:JSON.stringify(data)}).catch(()=>{});console.log('DEBUG pnpm setup outcome:', '${{ steps.pnpm_setup.outcome }}');"
      # #endregion
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm audit --prod
