version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: payday
      POSTGRES_PASSWORD: payday
      POSTGRES_DB: payday_hr
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  pg_data:
